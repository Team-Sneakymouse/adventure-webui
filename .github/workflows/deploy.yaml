name: "deploy"

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    tags-ignore: [ "**" ]

permissions:
  contents: "read"
  id-token: "write"

concurrency:
  group: ${{ github.ref }}-build
  cancel-in-progress: true

jobs:
  build:
    runs-on: "ubuntu-latest"
    environment:
      name: "production"
      url: "https://webui.advntr.dev"
    steps:
      - name: Show OIDC claims (right before assume)
        env:
          AUDIENCE: "${{ github.server_url }}/${{ github.repository_owner }}"
        run: |
          TOKEN_JSON=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=$AUDIENCE")
          ID_TOKEN=$(echo "$TOKEN_JSON" | jq -r .value)
          echo "$ID_TOKEN" | awk -F. '{print $2}' | base64 -d 2>/dev/null | jq -r
      - name: "setup env"
        id: "setup"
        uses: "KyoriPowered/ci-cookbook/actions/setup-java-env@f3b9a3fbb31e9f4320d855e7be17b028522e87be" # 2026.02.07
        with:
          runtime_version: 21
          publishing_branch_regex: "main"
          gradle_warning_mode: "all"

      - name: "fetch / registry credentials"
        uses: "Infisical/secrets-action@v1.0.16"
        with:
          method: "oidc"
          identity-id: "${{ secrets.INFISICAL_IDENTITY_ID }}"
          domain: "${{ secrets.INFISICAL_DOMAIN }}"
          project-slug: "lords-of-minecraft"
          env-slug: "prod"
          secret-path: "/Registry"

      - name: "validate / registry credentials"
        run: |
          test -n "${REGISTRY_HOST:-}" || { echo "REGISTRY_HOST was not provided by Infisical" >&2; exit 1; }
          test -n "${REGISTRY_USER:-}" || { echo "REGISTRY_USER was not provided by Infisical" >&2; exit 1; }
          test -n "${REGISTRY_PASSWORD:-}" || { echo "REGISTRY_PASSWORD was not provided by Infisical" >&2; exit 1; }

      - name: "setup / login to registry"
        run: |
          printf '%s' "$REGISTRY_PASSWORD" | docker login "$REGISTRY_HOST" \
            --username "$REGISTRY_USER" \
            --password-stdin

      - name: "publish / docker image"
        run: ./gradlew jib -Djib.to.image="$REGISTRY_HOST/adventure-webui:latest" -Djib.console=plain --stacktrace

      - name: "fetch / watchtower credentials"
        uses: "Infisical/secrets-action@v1.0.16"
        with:
          method: "oidc"
          identity-id: "${{ secrets.INFISICAL_IDENTITY_ID }}"
          domain: "${{ secrets.INFISICAL_DOMAIN }}"
          project-slug: "lords-of-minecraft"
          env-slug: "prod"
          secret-path: "/Watchtower"

      - name: "deploy / trigger watchtower"
        run: |
          test -n "${WATCHTOWER_URL:-}" || { echo "WATCHTOWER_URL was not provided by Infisical" >&2; exit 1; }
          test -n "${WATCHTOWER_TOKEN:-}" || { echo "WATCHTOWER_TOKEN was not provided by Infisical" >&2; exit 1; }

          curl --fail-with-body --show-error --silent \
            --request POST \
            --header "Authorization: Bearer $WATCHTOWER_TOKEN" \
            "$WATCHTOWER_URL"
